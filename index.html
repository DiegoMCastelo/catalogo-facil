<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Vivero</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f6ef;
    color:#1f2d1f;
}

.hero{
    min-height:340px;
    background:
        linear-gradient(rgba(20,45,28,.65), rgba(20,45,28,.70)),
        url("img/nueva imagen.png");
    background-size:cover;
    background-position:center;
    color:white;
    padding:55px 20px;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.hero h1{
    font-size:54px;
    margin:0;
    letter-spacing:1px;
}

.hero p{
    font-size:21px;
    max-width:620px;
    margin:18px auto 28px;
    line-height:1.5;
}

.hero a{
    background:white;
    color:#214d2b;
    padding:15px 28px;
    border-radius:40px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.hero a:hover{
    transform:translateY(-2px);
}

.filtros{
    max-width:1100px;
    margin:-25px auto 20px;
    background:white;
    padding:20px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    display:grid;
    grid-template-columns:1fr 220px;
    gap:15px;
}

.filtros input,
.filtros select{
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:16px;
}

.catalogo{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:24px;
    padding:25px;
}

.producto{
    background:#ffffff;
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 14px 35px rgba(0,0,0,.08);
    transition:.3s ease;
}

.producto:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 45px rgba(0,0,0,.12);
}

.info{
    padding:24px;
}

.info h2{
    font-size:24px;
    margin:8px 0 10px;
    color:#1f2d1f;
    line-height:1.2;
}

.info p{
    color:#667066;
    line-height:1.5;
    font-size:15px;
}

.precio{
    font-size:30px;
    font-weight:800;
    color:#214d2b;
    margin:14px 0;
}

.whatsapp{
    display:block;
    margin-top:18px;
    padding:15px;
    background:#214d2b;
    color:white;
    text-decoration:none;
    text-align:center;
    border-radius:999px;
    font-weight:bold;
    transition:.3s;
}

.whatsapp:hover{
    background:#16391f;
}

.wsp-flotante{
    position:fixed;
    right:20px;
    bottom:20px;
    background:#25D366;
    color:white;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:30px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

@media(max-width:700px){
    .hero h1{
        font-size:34px;
    }

    .filtros{
        grid-template-columns:1fr;
        margin:-20px 15px 15px;
    }
    .catalogo{
    grid-template-columns:1fr;
    padding:16px;
}

.galeria-producto img{
    height:300px;
}
}
.galeria-producto{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:10px;
    margin-bottom:0;
}

.galeria-producto img{
    width:100%;
    min-width:100%;
    height:280px;
    object-fit:cover;
    border-radius:14px;
    flex-shrink:0;
}

.foto-producto{
    cursor:pointer;
}

.visor-imagen{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.visor-imagen img{
    max-width:92%;
    max-height:88%;
    border-radius:14px;
    object-fit:contain;
}

.visor-imagen span{
    position:absolute;
    top:18px;
    right:24px;
    color:white;
    font-size:36px;
    cursor:pointer;
}


</style>
</head>

<body>

<section class="hero">
    <h1>Vivero en Cordoba</h1>
    <p class="submarca">🌿 Entregas programadas en Córdoba</p>
    <p>Plantas seleccionadas, macetas y deco natural para llenar de vida tus espacios.</p>
    <a href="https://wa.me/5493516549856" target="_blank">Consultar por WhatsApp</a>
</section>

<section class="filtros">
    <input
        type="text"
        id="buscador"
        placeholder="Buscar planta, maceta o producto..."
    >

    <select id="categoriaFiltro">
        <option value="">🌿 Todas las categorías</option>
        <option value="Plantas Interior">🌿 Plantas Interior</option>
        <option value="Plantas Exterior">🌳 Plantas Exterior</option>
        <option value="Macetas">🏺 Macetas</option>
        <option value="Fertilizantes">🌱 Fertilizantes</option>
        <option value="Plantas Artificiales">🍃 Plantas Artificiales</option>
        <option value="Budas y Fuentes">🧘 Budas y Fuentes</option>
        <option value="Herbolaria">🌾 Herbolaria</option>
        <option value="Promociones">🔥 Promociones</option>
    </select>
</section>

<main class="catalogo" id="catalogo">
    Cargando productos...
</main>

<a class="wsp-flotante" href="https://wa.me/5493516549856" target="_blank">☘</a>

<script type="module">
import { db } from "./js/firebase.js";

import {
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const catalogo = document.getElementById("catalogo");
const buscador = document.getElementById("buscador");
const categoriaFiltro = document.getElementById("categoriaFiltro");

let productos = [];

async function cargarProductos(){
    catalogo.innerHTML = "Cargando productos...";

    const snapshot = await getDocs(collection(db,"productos"));

    productos = [];

    snapshot.forEach(doc => {
        productos.push(doc.data());
    });

    mostrarProductos(productos);
}

function mostrarProductos(lista){
    catalogo.innerHTML = "";

    if(lista.length === 0){
        catalogo.innerHTML = "<p>No hay productos para mostrar.</p>";
        return;
    }

    lista.forEach(p => {
        const mensaje = encodeURIComponent(
            `Hola, quiero consultar por ${p.nombre} - $${p.precio}`
        );

catalogo.innerHTML += `
    <div class="producto">

        <div class="galeria-producto">
            ${(p.imagenes || [p.imagen]).map(img => `
                <img
            src="${img}"
            alt="${p.nombre}"
            class="foto-producto"
            onclick="abrirImagen('${img}')"
>
            `).join("")}
        </div>

        <div class="info">
            <span class="categoria">${p.categoria || "Vivero"}</span>
            <h2>${p.nombre}</h2>
            <div class="precio">$${p.precio}</div>
            <p>${p.descripcion || ""}</p>
            <a class="whatsapp" target="_blank"
               href="https://wa.me/5493516549856?text=${mensaje}">
               Consultar por WhatsApp
            </a>
        </div>
    </div>
`;
    });
}

function filtrar(){
    const texto = buscador.value.toLowerCase().trim();
    const categoria = categoriaFiltro.value.trim();

    const filtrados = productos.filter(p => {
        const coincideTexto =
            (p.nombre || "").toLowerCase().includes(texto) ||
            (p.descripcion || "").toLowerCase().includes(texto);

        const categoriaProducto = (p.categoria || "").trim();

        const coincideCategoria =
            categoria === "" || categoriaProducto === categoria;

        return coincideTexto && coincideCategoria;
    });

    mostrarProductos(filtrados);
}

buscador.addEventListener("input", filtrar);
categoriaFiltro.addEventListener("change", filtrar);

window.abrirImagen = function(url){
    document.getElementById("visorImagen").style.display = "flex";
    document.getElementById("imagenGrande").src = url;
}

window.cerrarImagen = function(){
    document.getElementById("visorImagen").style.display = "none";
}

cargarProductos();
</script>
<div id="visorImagen" class="visor-imagen">
    <span onclick="cerrarImagen()">✕</span>
    <img id="imagenGrande">
</div>

</body>
</html>
