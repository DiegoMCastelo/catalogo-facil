<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - App Vivero</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef4ec;
    color:#1e2f1e;
}

header{
    background:#214d2b;
    color:white;
    padding:25px;
    text-align:center;
}

.contenedor{
    max-width:1100px;
    margin:auto;
    padding:25px;
}

.panel{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    margin-bottom:30px;
}

input, textarea, button{
    width:100%;
    padding:13px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.btn-foto{
    display:block;
    width:100%;
    background:#2f6b3c;
    color:white;
    text-align:center;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
    margin:10px 0;
    cursor:pointer;
    box-sizing:border-box;
}

.btn-guardar{
    background:#214d2b;
    color:white;
}

.btn-cancelar{
    background:#777;
    color:white;
    display:none;
}

.preview{
    width:100%;
    max-height:300px;
    object-fit:cover;
    border-radius:14px;
    display:none;
    margin:10px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.card img{
    width:100%;
    height:210px;
    object-fit:cover;
}

.card-info{
    padding:15px;
}

.precio{
    font-size:22px;
    font-weight:bold;
    color:#214d2b;
}

.acciones{
    display:flex;
    gap:10px;
    margin-top:12px;
}

.btn-editar{
    background:#f0b429;
    color:#222;
}

.btn-eliminar{
    background:#d93025;
    color:white;
}

.galeria-admin{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:5px;
}

.galeria-admin img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:8px;
    flex-shrink:0;
}

</style>
</head>

<body>

<header>
    <h1>Panel Admin - App Vivero</h1>
    <p>Cargar, editar y eliminar productos</p>
</header>

<div class="contenedor">

    <div class="panel">
        <h2 id="titulo-form">Agregar Producto</h2>

        <input type="text" id="nombre" placeholder="Nombre del producto">
        <input type="number" id="precio" placeholder="Precio">
        <textarea id="descripcion" placeholder="Descripción"></textarea>

        <!-- NUEVO -->
        <select id="categoria">
            <option value="Plantas">🌿 Plantas</option>
            <option value="Macetas">🏺 Macetas</option>
            <option value="Tutores">🎋 Tutores</option>
            <option value="Fertilizantes">🌱 Fertilizantes</option>
            <option value="Promociones">🔥 Promociones</option>
            <option value="Destacadas">⭐ Destacadas</option>
        </select>

       <div class="acciones-fotos">

            <label for="camara" class="btn-foto">
                📷 Sacar foto
            </label>

            <label for="imagen" class="btn-foto">
                🖼️ Elegir de galería
            </label>

       </div>

<input
    type="file"
    id="camara"
    accept="image/*"
    capture="environment"
    multiple
    style="display:none;"
>

<input
    type="file"
    id="imagen"
    accept="image/*"
    multiple
    style="display:none;"
>

        <div id="preview" class="preview"></div>

        <button class="btn-guardar" id="guardar">
            Guardar Producto
        </button>

        <button class="btn-cancelar" id="cancelar">
            Cancelar edición
        </button>
    </div>

    <h2>Productos cargados</h2>
    <div class="grid" id="lista-productos"></div>

</div>

<script>
if (sessionStorage.getItem("adminOK") !== "true") {
    const clave = prompt("Ingrese clave de administrador:");

    if (clave === "vivero123") {
        sessionStorage.setItem("adminOK", "true");
    } else {
        alert("Clave incorrecta");
        window.location.href = "index.html";
    }
}
</script>

<script type="module">
import { db } from "./js/firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const nombreInput = document.getElementById("nombre");
const precioInput = document.getElementById("precio");
const descripcionInput = document.getElementById("descripcion");
const imagenInput = document.getElementById("imagen");
const preview = document.getElementById("preview");
const camaraInput = document.getElementById("camara");
const guardarBtn = document.getElementById("guardar");
const cancelarBtn = document.getElementById("cancelar");
const lista = document.getElementById("lista-productos");
const tituloForm = document.getElementById("titulo-form");

let editandoId = null;
let imagenActual = "";

function mostrarPreview(archivos) {

    if (!archivos || archivos.length === 0) {
        return;
    }

    preview.innerHTML = "";
    preview.style.display = "flex";

    Array.from(archivos).forEach(archivo => {

        const lector = new FileReader();

        lector.onload = e => {

            const img = document.createElement("img");

            img.src = e.target.result;
            img.style.width = "110px";
            img.style.height = "110px";
            img.style.objectFit = "cover";
            img.style.borderRadius = "12px";
            img.style.margin = "6px";

            preview.appendChild(img);
        };

        lector.readAsDataURL(archivo);

    });
}

imagenInput.addEventListener("change", () => {
    mostrarPreview(imagenInput.files);
});

camaraInput.addEventListener("change", () => {
    mostrarPreview(camaraInput.files);
});

async function subirImagen(archivo){
    const base64 = await convertirABase64(archivo);

    const respuesta = await fetch("/api/subir-imagen", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            imagen: base64
        })
    });

    const texto = await respuesta.text();

let datos;

try{
    datos = JSON.parse(texto);
}catch(error){
    throw new Error(texto);
}

if(!datos.ok){
    throw new Error(datos.error || "Error al subir imagen");
}

return datos.imagenUrl;
}

function convertirABase64(archivo){
    return new Promise((resolve, reject) => {
        const img = new Image();
        const lector = new FileReader();

        lector.onload = e => {
            img.src = e.target.result;
        };

        img.onload = () => {
            const canvas = document.createElement("canvas");

            const maxAncho = 1200;
            const escala = maxAncho / img.width;

            canvas.width = maxAncho;
            canvas.height = img.height * escala;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const imagenReducida = canvas.toDataURL("image/jpeg", 0.75);

            resolve(imagenReducida);
        };

        img.onerror = reject;
        lector.onerror = reject;

        lector.readAsDataURL(archivo);
    });
}

guardarBtn.addEventListener("click", async () => {
    try {
        guardarBtn.disabled = true;
        guardarBtn.innerText = "Guardando...";

        const nombre = nombreInput.value.trim();
        const precio = Number(precioInput.value);
        const descripcion = descripcionInput.value.trim();
        const archivosGaleria = imagenInput.files;
const archivosCamara = camaraInput.files;

const archivos = archivosGaleria.length > 0 ? archivosGaleria : archivosCamara;

        if (!nombre || !precio) {
            alert("Completá nombre y precio");
            guardarBtn.disabled = false;
            guardarBtn.innerText = editandoId ? "Actualizar Producto" : "Guardar Producto";
            return;
        }

        let imagenes = [];
        let imagenUrl = imagenActual;

        if (archivos && archivos.length > 0) {
            for (let i = 0; i < archivos.length; i++) {
                const url = await subirImagen(archivos[i]);
                imagenes.push(url);
            }

            imagenUrl = imagenes[0] || "";
        }

        if (!imagenUrl) {
            alert("Seleccioná una imagen");
            guardarBtn.disabled = false;
            guardarBtn.innerText = editandoId ? "Actualizar Producto" : "Guardar Producto";
            return;
        }

        if (editandoId) {
            const datosActualizar = {
                nombre,
                precio,
                descripcion,
                imagen: imagenUrl,
                actualizado: serverTimestamp()
            };

            if (imagenes.length > 0) {
                datosActualizar.imagenes = imagenes;
            }

            await updateDoc(doc(db, "productos", editandoId), datosActualizar);

            alert("Producto actualizado correctamente");
        } else {
            await addDoc(collection(db, "productos"), {
    nombre,
    precio,
    descripcion,
    categoria: document.getElementById("categoria")?.value || "Plantas",
    imagen: imagenUrl,
    imagenes: imagenes,
    createdAt: serverTimestamp()
});

            alert("Producto guardado correctamente");
        }

        limpiarFormulario();
        cargarProductos();

    } catch (error) {
        console.error(error);
        alert("Error al guardar producto: " + error.message);
    }

    guardarBtn.disabled = false;
    guardarBtn.innerText = editandoId ? "Actualizar Producto" : "Guardar Producto";
});

async function cargarProductos(){
    lista.innerHTML = "Cargando productos...";

    const snapshot = await getDocs(collection(db,"productos"));

    lista.innerHTML = "";

    snapshot.forEach(documento => {
        const p = documento.data();
        const id = documento.id;

       lista.innerHTML += `
    <div class="card">

        <div class="galeria-admin">
            ${(p.imagenes || [p.imagen]).map(img => `
                <img src="${img}" alt="${p.nombre}">
            `).join("")}
        </div>

        <div class="card-info">
            <h3>${p.nombre}</h3>
            <div class="precio">$${p.precio}</div>
            <p>${p.descripcion || ""}</p>

            <div class="acciones">
                <button class="btn-editar" data-id="${id}">Editar</button>
                <button class="btn-eliminar" data-id="${id}">Eliminar</button>
            </div>
        </div>

    </div>
`;

    });

    activarBotones();
}

function activarBotones(){
    document.querySelectorAll(".btn-eliminar").forEach(btn => {
        btn.addEventListener("click", async () => {
            const id = btn.dataset.id;

            if(confirm("¿Seguro que querés eliminar este producto?")){
                await deleteDoc(doc(db,"productos",id));
                cargarProductos();
            }
        });
    });

    document.querySelectorAll(".btn-editar").forEach(btn => {
        btn.addEventListener("click", async () => {
            const id = btn.dataset.id;

            const snapshot = await getDocs(collection(db,"productos"));

            snapshot.forEach(documento => {
                if(documento.id === id){
                    const p = documento.data();

                    editandoId = id;
                    imagenActual = p.imagen;

                    nombreInput.value = p.nombre;
                    precioInput.value = p.precio;
                    descripcionInput.value = p.descripcion || "";

                    preview.src = p.imagen;
                    preview.style.display = "block";

                    tituloForm.innerText = "Editar Producto";
                    guardarBtn.innerText = "Actualizar Producto";
                    cancelarBtn.style.display = "block";

                    window.scrollTo({top:0, behavior:"smooth"});
                }
            });
        });
    });
}

cancelarBtn.addEventListener("click", limpiarFormulario);

function limpiarFormulario(){
    editandoId = null;
    imagenActual = "";

    nombreInput.value = "";
    precioInput.value = "";
    descripcionInput.value = "";
    imagenInput.value = "";

    preview.src = "";
    preview.style.display = "none";

    tituloForm.innerText = "Agregar Producto";
    guardarBtn.innerText = "Guardar Producto";
    cancelarBtn.style.display = "none";
}

cargarProductos();
</script>

</body>
</html>
